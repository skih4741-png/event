  body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard Variable', Pretendard, system-ui, sans-serif; background:#fbfaf7; color:#141417; display:grid; place-items:center; min-height:100vh; margin:0; }
  .box { text-align:center; padding:2rem; }
  a { color:#ff5b3a; font-weight:600; text-decoration:none; }
  a:hover { text-decoration:underline; }
  .spinner { width:32px; height:32px; border:3px solid #ececef; border-top-color:#ff5b3a; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>이벤트 페이지로 이동 중…</p>
    <p style="margin-top:1rem; font-size:.85rem; color:#8a8a94;">자동으로 이동되지 않으면 <a href="이벤트.html">여기를 클릭</a></p>
  </div>
  <script>location.replace('이벤트.html');</script>
</body>
